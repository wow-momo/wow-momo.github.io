<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Background-transparent logo for WoW!!! Mo:Mo -->
  
  <!-- Momo icon (stylized dumpling in a rounded square) -->
  <rect x="4" y="12" width="76" height="76" rx="16" fill="#E85D26"/>
  
  <!-- Dumpling shape - top pleated dome -->
  <path d="M42 28 C28 28 20 42 20 52 C20 62 28 68 42 68 C56 68 64 62 64 52 C64 42 56 28 42 28Z" fill="#FFF5E6" opacity="0.95"/>
  
  <!-- Pleats on top of momo -->
  <path d="M42 28 C42 28 38 38 36 44" stroke="#E85D26" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M42 28 C42 28 42 40 42 46" stroke="#E85D26" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M42 28 C42 28 46 38 48 44" stroke="#E85D26" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Steam wisps -->
  <path d="M34 24 C34 20 30 18 32 14" stroke="#FFF5E6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M42 22 C42 18 40 16 42 12" stroke="#FFF5E6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M50 24 C50 20 54 18 52 14" stroke="#FFF5E6" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  
  <!-- Bottom plate line -->
  <ellipse cx="42" cy="68" rx="22" ry="4" fill="#D14E1D" opacity="0.3"/>
  
  <!-- Brand text -->
  <text x="96" y="55" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="42" letter-spacing="-1">
    <tspan fill="#E85D26">WoW</tspan><tspan fill="#E85D26" font-size="30" dy="-2">!!!</tspan><tspan fill="#FFF5E6" dx="4" dy="2"> Mo:Mo</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="98" y="74" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="500" font-size="11" fill="#FFF5E6" opacity="0.5" letter-spacing="3" text-transform="uppercase">
    AUTHENTIC NEPALI MOMOS
  </text>
</svg>